name: Publish RAPIDS wheels

on:
  workflow_call:
    inputs:
      branch:
        description: |
          Git branch the workflow run targets.
          This is required even when 'sha' is provided because it is also used for organizing artifacts.
        type: string
      date:
        description: "Date (YYYY-MM-DD) this run is for. Used to organize artifacts produced by nightly builds"
        type: string
      sha:
        description: "Full git commit SHA to check out"
        type: string
      repo:
        description: "Git repo to check out, in '{org}/{repo}' form, e.g. 'rapidsai/cudf'"
        type: string
      build_type:
        description: "One of: [branch, nightly, pull-request]"
        required: true
        type: string

      # general settings
      package-name:
        description: |
          Distribution name, without any other qualifiers (e.g. 'pylibcudf', not 'pylibcudf-cu12-cp311-manylinux_2_24_aarch64')
        required: true
        type: string
      package-type:
        description: "One of: [cpp, python]"
        required: false
        default: python
        type: string
      publish_to_pypi:
        description: "If true, the wheel will be published to pypi.org"
        type: boolean
        default: false
      build_workflow_name:
        description: |
          Name of a workflow file that produced artifacts to be downloaded in this run.
          If not set (the default), artifact-handling scripts use RAPIDS-conventional defaults (like "build.yaml" when "build_type == nightly").
        required: false
        type: string
      publish-wheel-search-key:
        description: "Search key to use to override constructed search path in `rapids-wheels-anaconda-github`"
        type: string
        required: false
    secrets:
      CONDA_RAPIDSAI_WHEELS_NIGHTLY_TOKEN:
        description: "Anaconda token for RAPIDS wheel nightly uploads"
        required: false
      RAPIDSAI_PYPI_TOKEN:
        description: "Anaconda token for RAPIDS wheel release uploads"
        required: false

permissions:
  actions: read
  checks: none
  contents: read
  deployments: none
  discussions: none
  id-token: write
  issues: none
  packages: read
  pages: none
  pull-requests: read
  repository-projects: none
  security-events: none
  statuses: none

jobs:
  wheel-publish:
    name: wheels publish
    # Use a self-hosted runner to ensure we have sufficient disk space. Using
    # cpu8 since we shouldn't need much CPU horsepower.
    runs-on: "linux-amd64-cpu8"
    container:
      # CUDA toolkit version of the container is irrelevant in the publish step.
      # This just uploads already-built wheels to remote storage.
      image: "python:3.14-slim"
      env:
        RAPIDS_BUILD_TYPE: ${{ inputs.build_type }}
    steps:

    - name: Setup proxy cache
      uses: nv-gha-runners/setup-proxy-cache@main
      continue-on-error: true
      with:
        enable-apt: true

    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        repository: rapidsai/gha-tools
        ref: test-uploads
        fetch-depth: 1
        fetch-tags: false
        lfs: false
        submodules: false
        path: ${{ runner.temp }}/gha-tools
        persist-credentials: false
        sparse-checkout: |
          tools

    - name: Add gha-tools to PATH
      run: echo "${RUNNER_TEMP}/gha-tools/tools" >> "${GITHUB_PATH}"

    - name: Install tools
      run: |
        # install tools needed to bootstrap others
        apt-get update
        apt-get install -y --no-install-recommends \
          curl

        # set up source for latest 'gh' releases
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
        chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list

        # install tools with system package manager
        apt-get update
        apt-get install -y --no-install-recommends \
          git \
          gh \
          jq

        # anaconda client (for 'rapids-wheels-anaconda-github')
        python -m pip install \
          --prefer-binary \
          'anaconda-client>=1.13.1'

    - name: Standardize repository information
      uses: rapidsai/shared-actions/rapids-github-info@main
      with:
        repo: ${{ inputs.repo }}
        branch: ${{ inputs.branch }}
        build_workflow_name: ${{ inputs.build_workflow_name }}
        date: ${{ inputs.date }}
        # On 'push' or 'tag', 'inputs.sha' is null.
        # Fall back to 'github.sha' to avoid needing a repo checkout.
        sha: ${{ inputs.sha || github.sha }}

    # Per the docs at https://docs.github.com/en/rest/rate-limit/rate-limit?apiVersion=2022-11-28#get-rate-limit-status-for-the-authenticated-user,
    # checking '/rate_limit | jq .' should not itself count against any rate limits.
    - name: Check GitHub API rate limits
      run: |
        gh api /rate_limit | jq .
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Download wheels from artifact storage and publish to anaconda repository
      id: download_wheels
      run: |
        UPLOAD_DIR="$(mktemp -d)"
        rapids-wheels-anaconda-github \
          "${INPUTS_PACKAGE_NAME}" \
          "${INPUTS_PACKAGE_TYPE}" \
          "${UPLOAD_DIR}"
        echo "package_upload_dir=${UPLOAD_DIR}" >> "${GITHUB_OUTPUT}"
      env:
        GH_TOKEN: ${{ github.token }}
        RAPIDS_CONDA_TOKEN: ${{ secrets.CONDA_RAPIDSAI_WHEELS_NIGHTLY_TOKEN }}
        PACKAGENAME: ${{ inputs.package-name }}
        PACKAGETYPE: ${{ inputs.package-type }}
        INPUTS_PACKAGE_NAME: ${{ inputs.package-name }}
        INPUTS_PACKAGE_TYPE: ${{ inputs.package-type }}
        # Used to override search key construction as needed
        WHEEL_SEARCH_KEY: ${{ inputs.publish-wheel-search-key }}

    - name: Check if build is release
      id: check_if_release
      shell: bash
      if: ${{ inputs.publish_to_pypi }}
      run: |
        if rapids-is-release-build; then
          echo "is_release_build=true" | tee -a "${GITHUB_OUTPUT}"
        else
          echo "is_release_build=false" | tee -a "${GITHUB_OUTPUT}"
        fi

    - name: Publish the downloaded wheels to PyPI
      if: ${{ inputs.publish_to_pypi && steps.check_if_release.outputs.is_release_build == 'true' }}
      run: |
        python3 -m pip install 'twine>=6.2.0'
        python3 -m twine upload -u __token__ "${UPLOAD_DIR}"/*
      env:
        UPLOAD_DIR: ${{ steps.download_wheels.outputs.package_upload_dir }}
        TWINE_PASSWORD: ${{ secrets.RAPIDSAI_PYPI_TOKEN }}
